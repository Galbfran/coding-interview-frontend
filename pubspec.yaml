name: conversion_calculator
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.10.8


dependencies:
  flutter:
    sdk: flutter

  # --- Navegación ---
  # Rutas declarativas y deep linking (MaterialApp.router).
  go_router: ^17.2.0

  # --- Red ---
  # Cliente HTTP (interceptors, timeouts, etc.).
  dio: ^5.9.2

  # --- Estado (patrón BLoC) ---
  # Contrato base Cubit/Bloc (sin widgets).
  bloc: ^9.2.0
  # Integración con Flutter: BlocProvider, BlocBuilder, etc.
  flutter_bloc: ^9.1.1
  # Comparación de estados por valor (==) sin boilerplate.
  equatable: ^2.0.8

  # --- Configuración ---
  # Variables de entorno desde .env (URLs, flags, etc.).
  flutter_dotenv: ^6.0.0

  # --- Utilidades ---
  # Logs estructurados en consola (útil en debug).
  logger: ^2.7.0

  # --- UI ---
  # Iconos estilo iOS (CupertinoIcons).
  cupertino_icons: ^1.0.8
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/el_dorado_icono.png
  adaptive_icon_background: "#FFDD00"
  adaptive_icon_foreground: assets/el_dorado_icono.png
  adaptive_icon_foreground_inset: 0

flutter:


  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - .env
    - assets/cripto_currencies/
    - assets/fiat_currencies/


  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto_Condensed-Regular.ttf
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
